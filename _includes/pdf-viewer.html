<div class="pdf-container">
  <div class="pdf-header">
    <h4 class="pdf-title">{{ include.title }}</h4>
    {% if include.subtitle %}
      <p class="pdf-subtitle">{{ include.subtitle }}</p>
    {% endif %}
  </div>

  <div class="pdf-frame-wrapper">
    <iframe
      src="{{ include.file | relative_url }}"
      class="pdf-frame"
      loading="lazy">
    </iframe>
  </div>

  <div class="pdf-fallback">
    <p>
      Tu navegador no puede mostrar el PDF directamente.
      <a href="{{ include.file | relative_url }}" target="_blank">
        Haz clic aquí para abrirlo.
      </a>
    </p>
  </div>
</div>

<style>
.pdf-container {
  margin: 40px 0;
  padding: 0;
}

.pdf-header {
  margin-bottom: 12px;
}

.pdf-title {
  margin: 0;
  font-size: 1.2rem;
  font-weight: 600;
  color: #1c1c1c;
  letter-spacing: -0.3px;
}

.pdf-subtitle {
  margin: 4px 0 0;
  font-size: 0.95rem;
  color: #666;
}

/* Marco visual profesional */
.pdf-frame-wrapper {
  border: 1px solid #e5e5e5;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

/* Frame del PDF */
.pdf-frame {
  width: 100%;
  height: 600px;
  border: none;
}

.pdf-fallback {
  margin-top: 10px;
  font-size: 0.85rem;
  color: #888;
}
.pdf-fallback a {
  color: #0056e0;
}
</style>

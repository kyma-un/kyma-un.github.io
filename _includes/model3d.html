<div class="model3d-block" style="margin: 2rem 0; text-align: center;">
  
  {% if include.title %}
  <h4 style="margin-bottom: 0.5rem; font-weight: 600;">
    {{ include.title }}
  </h4>
  {% endif %}

  <model-viewer
    src="{{ include.src }}"
    alt="{{ include.alt | default: include.title }}"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    style="width: 100%; max-width: 700px; height: {{ include.height | default: '400px' }}; margin: 1rem auto;">
  </model-viewer>

  {% if include.caption %}
  <p style="font-size: 0.9rem; color: #666; margin-top: 0.5rem;">
    <em>{{ include.caption }}</em>
  </p>
  {% endif %}

</div>

<div style="margin: 2rem 0;">
  {% if include.title %}
  <h2 style="text-align:center;">{{ include.title }}</h2>
  {% endif %}

  <iframe
    src="https://kicanvas.org/?{{ include.source }}"
    width="100%"
    height="{{ include.height | default: '600px' }}"
    style="border:none; border-radius: 8px;">
  </iframe>

  {% if include.caption %}
  <p style="text-align:center; font-size:0.85rem; color:#666;">
    <em>{{ include.caption }}</em>
  </p>
  {% endif %}
</div>
